<svg xmlns="http://www.w3.org/2000/svg" width="480" height="240" viewBox="0 0 480 240" fill="none">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0E0E1B"/>
            <stop offset="100%" stop-color="#05050A"/>
        </linearGradient>
        <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06B6D4"/>
            <stop offset="100%" stop-color="#0D9488"/>
        </linearGradient>
        <linearGradient id="radar-fill" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.4"/>
        </linearGradient>
        <filter id="glow-radar" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
    </defs>

    <rect width="480" height="240" rx="12" fill="url(#bg-grad)" stroke="#1E1B4B" stroke-width="1.5"/>

    <!-- Radar Grid lines -->
    <path d="M 160.0 90.0 L 179.0 103.8 L 171.8 126.2 L 148.2 126.2 L 141.0 103.8 Z" stroke="#1E1B4B" stroke-width="0.8"/><path d="M 160.0 70.0 L 198.0 97.6 L 183.5 142.4 L 136.5 142.4 L 122.0 97.6 Z" stroke="#1E1B4B" stroke-width="0.8"/><path d="M 160.0 50.0 L 217.1 91.5 L 195.3 158.5 L 124.7 158.5 L 102.9 91.5 Z" stroke="#1E1B4B" stroke-width="0.8"/><path d="M 160.0 30.0 L 236.1 85.3 L 207.0 174.7 L 113.0 174.7 L 83.9 85.3 Z" stroke="#1E1B4B" stroke-width="0.8"/>
    
    <!-- Axis lines -->
    <line x1="160" y1="110" x2="160.0" y2="30.0" stroke="#1E1B4B" stroke-dasharray="2 2" stroke-width="0.8"/><line x1="160" y1="110" x2="236.1" y2="85.3" stroke="#1E1B4B" stroke-dasharray="2 2" stroke-width="0.8"/><line x1="160" y1="110" x2="207.0" y2="174.7" stroke="#1E1B4B" stroke-dasharray="2 2" stroke-width="0.8"/><line x1="160" y1="110" x2="113.0" y2="174.7" stroke="#1E1B4B" stroke-dasharray="2 2" stroke-width="0.8"/><line x1="160" y1="110" x2="83.9" y2="85.3" stroke="#1E1B4B" stroke-dasharray="2 2" stroke-width="0.8"/>

    <!-- Glowing Radar Value Polygon -->
    <path d="M 160.0 54.0 L 190.4 100.1 L 207.0 174.7 L 115.3 171.5 L 91.5 87.8 Z" fill="url(#radar-fill)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#glow-radar)"/>

    <!-- Anchor Dots -->
    <circle cx="160.0" cy="54.0" r="3" fill="#A78BFA"/>
    <circle cx="190.4" cy="100.1" r="3" fill="#C084FC"/>
    <circle cx="207.0" cy="174.7" r="3" fill="#EC4899"/>
    <circle cx="115.3" cy="171.5" r="3" fill="#34D399"/>
    <circle cx="91.5" cy="87.8" r="3" fill="#22D3EE"/>

    <!-- Axis Labels -->
    <text x="160" y="22" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#A78BFA" text-anchor="middle">MODULARITY (70%)</text>
    <text x="249.4" y="81.0" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#C084FC" text-anchor="start">ONBOARDING (40%)</text>
    <text x="212.9" y="186.8" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#EC4899" text-anchor="start">VIRALITY (100%)</text>
    <text x="107.1" y="186.8" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#34D399" text-anchor="end">SPEED (95%)</text>
    <text x="70.6" y="81.0" font-family="'Space Grotesk', sans-serif" font-size="8" font-weight="700" fill="#22D3EE" text-anchor="end">SAFETY (90%)</text>

    <!-- Side metrics column -->
    <g transform="translate(310, 45)">
        <text x="0" y="15" font-family="'Outfit', sans-serif" font-size="14" font-weight="800" fill="#FFF">COGNITIVE INDEX</text>
        <rect x="0" y="24" width="130" height="2" fill="url(#neon-cyan)"/>
        
        <text x="0" y="45" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#94A3B8">Architecture Shield:</text>
        <text x="120" y="45" font-family="'Fira Code', monospace" font-size="11" font-weight="700" fill="#34D399">ACTIVE</text>

        <text x="0" y="65" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#94A3B8">Modularity drift:</text>
        <text x="120" y="65" font-family="'Fira Code', monospace" font-size="11" font-weight="700" fill="#22D3EE">+4.2%</text>

        <text x="0" y="85" font-family="'Space Grotesk', sans-serif" font-size="10" fill="#94A3B8">Release Quality Gate:</text>
        <text x="120" y="85" font-family="'Fira Code', monospace" font-size="11" font-weight="700" fill="#A78BFA">LOCKED</text>
    </g>
</svg>
